services:
  # Database is remote: travel.link360.vn
  # Connection values come from .env.production / Coolify environment variables

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env.production
    ports:
      - "8000:8000"
    volumes:
      - app-uploads:/app/uploads
    networks:
      - app-network
    environment:
      - RUN_ALEMBIC_MIGRATIONS=false

  frontend:
    depends_on:
      - backend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
        - NODE_ENV=production
    restart: always
    ports:
      - "5173:80"
    networks:
      - app-network

  prestart:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: "no"
    command: bash scripts/prestart.sh
    env_file:
      - .env.production
    networks:
      - app-network
    environment:
      - RUN_ALEMBIC_MIGRATIONS=true

volumes:
  app-uploads:

networks:
  app-network:
    driver: bridge
