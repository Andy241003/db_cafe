services:
  # Database is remote: travel.link360.vn
  # Connection: pymysql://vrcafe_user:cafe@1234@travel.link360.vn:3306/vrcafe_db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env.production
    ports:
      - "8000:8000"
    volumes:
      - app-uploads:/app/uploads
    networks:
      - app-network
    environment:
      - RUN_ALEMBIC_MIGRATIONS=false

  frontend:
    depends_on:
      - backend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://travel.link360.vn/api
        - NODE_ENV=production
    restart: always
    ports:
      - "5173:80"
    networks:
      - app-network

  prestart:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: "no"
    command: bash scripts/prestart.sh
    env_file:
      - .env.production
    networks:
      - app-network
    environment:
      - RUN_ALEMBIC_MIGRATIONS=true

  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080"
    networks:
      - app-network

volumes:
  app-uploads:

networks:
  app-network:
    driver: bridge
