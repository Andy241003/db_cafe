version: "3.8"

services:
  db:
    restart: always
    ports:
      - "3307:3306"

  adminer:
    restart: always
    ports:
      - "8081:8080"

  backend:
    restart: always
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env

  frontend:
    restart: always
    build:
      context: ./frontend
      args:
        - VITE_API_URL=https://travel.link360.vn/api
        - NODE_ENV=production
    ports:
      - "3001:80"
