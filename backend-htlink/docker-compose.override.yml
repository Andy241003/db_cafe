services:
  # db service removed - using remote MySQL at travel.link360.vn
  # db:
  #   restart: always
  #   ports:
  #     - "3307:3306"

  adminer:
    restart: always
    ports:
      - "8081:8080"

  backend:
    restart: always
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ALLOW_LOCALHOST_CORS=true

  frontend:
    restart: always
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://host.docker.internal:8000
        - NODE_ENV=production
    ports:
      - "3001:80"
    environment:
      - VITE_API_URL=http://host.docker.internal:8000
