<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Upload Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .upload-area { border: 2px dashed #ccc; padding: 20px; margin: 20px 0; }
        .preview { max-width: 200px; margin: 10px; border: 1px solid #ddd; }
        .result { background: #f5f5f5; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Media Upload Test</h1>
    
    <div class="upload-area">
        <input type="file" id="fileInput" accept="image/*" multiple>
        <button onclick="uploadFiles()">Upload</button>
    </div>
    
    <div id="results"></div>
    <div id="previews"></div>

    <script>
        let token = null;
        
        // Auto login on page load
        window.onload = async function() {
            await login();
        }
        
        async function login() {
            try {
                const formData = new FormData();
                formData.append('username', 'admin@travel.link360.vn');
                formData.append('password', 'SuperSecretPass123');
                
                const response = await fetch('http://localhost:8000/api/v1/auth/login', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const data = await response.json();
                    token = data.access_token;
                    document.getElementById('results').innerHTML += '<div class="result">✅ Login successful</div>';
                } else {
                    document.getElementById('results').innerHTML += '<div class="result">❌ Login failed</div>';
                }
            } catch (error) {
                document.getElementById('results').innerHTML += '<div class="result">❌ Login error: ' + error.message + '</div>';
            }
        }
        
        async function uploadFiles() {
            if (!token) {
                alert('Please login first');
                return;
            }
            
            const fileInput = document.getElementById('fileInput');
            const files = fileInput.files;
            
            if (files.length === 0) {
                alert('Please select files');
                return;
            }
            
            for (let file of files) {
                await uploadSingleFile(file);
            }
        }
        
        async function uploadSingleFile(file) {
            try {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('alt_text', 'Test upload from HTML');
                
                const response = await fetch('http://localhost:8000/api/v1/media/upload?kind=image', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'X-Tenant-Code': 'demo'
                    },
                    body: formData
                });
                
                if (response.ok) {
                    const result = await response.json();
                    console.log('Upload result:', result);
                    
                    document.getElementById('results').innerHTML += 
                        `<div class="result">✅ Upload successful: ${file.name}<br>
                         File Key: ${result.file_key}<br>
                         ID: ${result.id}</div>`;
                    
                    // Create preview image
                    const previewUrl = `http://localhost:8000/api/v1/media/${result.file_key}`;
                    const img = document.createElement('img');
                    img.src = previewUrl;
                    img.className = 'preview';
                    img.alt = 'Preview';
                    img.onload = function() {
                        document.getElementById('results').innerHTML += 
                            `<div class="result">✅ Preview loaded successfully</div>`;
                    };
                    img.onerror = function() {
                        document.getElementById('results').innerHTML += 
                            `<div class="result">❌ Preview failed to load</div>`;
                    };
                    
                    document.getElementById('previews').appendChild(img);
                    
                } else {
                    const errorText = await response.text();
                    document.getElementById('results').innerHTML += 
                        `<div class="result">❌ Upload failed: ${errorText}</div>`;
                }
            } catch (error) {
                document.getElementById('results').innerHTML += 
                    `<div class="result">❌ Upload error: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
