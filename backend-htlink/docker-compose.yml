services:
  # Database removed - using remote server at travel.link360.vn
  # Connection: pymysql://vrcafe_user:cafe@1234@travel.link360.vn:3306/vrcafe_db

  backend:
    build:
      context: ./backend
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - backend-uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        - VITE_API_URL=http://backend:8000
        - NODE_ENV=development
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://backend:8000
      - NODE_OPTIONS=--max-old-space-size=384

  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080"

  prestart:
    build:
      context: ./backend
    restart: "no"
    profiles: ["setup"]
    command: bash scripts/prestart.sh
    env_file:
      - .env.production

volumes:
  backend-uploads:
