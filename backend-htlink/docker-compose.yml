services:
  db:
    image: mysql:8.0
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - restaurant-db-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
      - ../linkhotel_saas_schema_seed.sql:/seed/linkhotel_saas_schema_seed.sql:ro
      - ./create_cafe_tables_fixed.sql:/seed/create_cafe_tables_fixed.sql:ro
      - ./backend/migrations:/seed/backend-migrations:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - backend-uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        - VITE_API_URL=http://backend:8000
        - NODE_ENV=development
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://backend:8000
      - NODE_OPTIONS=--max-old-space-size=384
    depends_on:
      backend:
        condition: service_started

  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_started

  prestart:
    build:
      context: ./backend
    restart: "no"
    profiles: ["setup"]
    command: bash scripts/prestart.sh
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  backend-uploads:
  restaurant-db-data:
