# Nginx config for production server travel.link360.vn
# This config handles CORS for all API requests to avoid duplicate headers with FastAPI
# Place this in: /etc/nginx/sites-available/travel.link360.vn
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    server_name travel.link360.vn;
    client_max_body_size 100M;
    
    # Backend FastAPI
    location /api/ {
        # Hide CORS headers from backend to avoid duplicates
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;
        
        # CORS headers - support both specific domain and wildcard subdomains
        set $cors_origin "";
        if ($http_origin ~* "^https://(app\.botonblue\.com|.*\.botonblue\.com)$") {
            set $cors_origin $http_origin;
        }
        
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, Accept" always;
        add_header Access-Control-Allow-Credentials "true" always;
        
        # Handle preflight OPTIONS requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, Accept" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 3600;
            add_header Content-Length 0;
            add_header Content-Type "text/plain";
            return 204;
        }
        
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts for API requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Frontend React Public Site
    location / {
        root /var/www/hotel-link/backend-htlink/frontend/dist;
        index index.html;
        try_files $uri /index.html;
    }
    
    # Adminer
    location /adminer/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/travel.link360.vn/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/travel.link360.vn/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = travel.link360.vn) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    server_name travel.link360.vn;
    listen 80;
    return 404; # managed by Certbot
}
