<!-- 
  HotelLink Analytics v2.0 - Standalone Script
  For: app.botonblue.com (Boton Blue Resort)
  Add this script to your website's <head> or before </body>
-->
<script>
(function() {
  'use strict';
  
  // ========== CONFIGURATION ==========
  const CONFIG = {
    trackingKey: 'boton_blue_tracking',
    apiUrl: 'https://travel.link360.vn/api/v1'
  };
  
  // ========== RATE LIMITING ==========
  const RATE_LIMITS = {
    pageView: 30000,  // 30 seconds
    click: 12000,     // 12 seconds
    share: 60000      // 60 seconds
  };
  
  const MAX_CLICKS_PER_MINUTE = 5;
  const clickHistory = [];
  
  // ========== SESSION MANAGEMENT ==========
  function getSessionId() {
    const SESSION_KEY = 'hotellink_session_id';
    const SESSION_DURATION = 30 * 60 * 1000; // 30 minutes
    
    let session = null;
    try {
      const stored = localStorage.getItem(SESSION_KEY);
      if (stored) {
        session = JSON.parse(stored);
        if (Date.now() - session.timestamp > SESSION_DURATION) {
          session = null;
        }
      }
    } catch (e) {
      // Storage not available
    }
    
    if (!session) {
      session = {
        id: generateUUID(),
        timestamp: Date.now()
      };
      try {
        localStorage.setItem(SESSION_KEY, JSON.stringify(session));
      } catch (e) {
        // Ignore storage errors
      }
    }
    
    return session.id;
  }
  
  function generateUUID() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
      const r = Math.random() * 16 | 0;
      const v = c === 'x' ? r : (r & 0x3 | 0x8);
      return v.toString(16);
    });
  }
  
  // ========== RATE LIMITING ==========
  function checkRateLimit(eventType) {
    const LIMIT_KEY = 'hotellink_last_' + eventType;
    const limit = RATE_LIMITS[eventType] || 0;
    
    if (!limit) return true;
    
    try {
      const lastTime = localStorage.getItem(LIMIT_KEY);
      if (lastTime) {
        const elapsed = Date.now() - parseInt(lastTime, 10);
        if (elapsed < limit) {
          console.debug('HotelLink: Rate limit for ' + eventType + ', wait ' + Math.ceil((limit - elapsed) / 1000) + 's');
          return false;
        }
      }
      localStorage.setItem(LIMIT_KEY, Date.now().toString());
    } catch (e) {
      // Storage not available, allow tracking
    }
    
    return true;
  }
  
  function checkClickRateLimit() {
    const now = Date.now();
    const oneMinuteAgo = now - 60000;
    
    while (clickHistory.length > 0 && clickHistory[0] < oneMinuteAgo) {
      clickHistory.shift();
    }
    
    if (clickHistory.length >= MAX_CLICKS_PER_MINUTE) {
      console.debug('HotelLink: Click rate limit exceeded');
      return false;
    }
    
    clickHistory.push(now);
    return true;
  }
  
  // ========== DEVICE DETECTION ==========
  function detectDevice() {
    const userAgent = navigator.userAgent.toLowerCase();
    
    if (/mobile|android|iphone|ipod|windows phone/.test(userAgent)) {
      return 'mobile';
    } else if (/ipad|tablet|kindle/.test(userAgent)) {
      return 'tablet';
    } else {
      return 'desktop';
    }
  }
  
  // ========== EVENT TRACKING ==========
  function trackEvent(eventType, additionalData) {
    additionalData = additionalData || {};
    
    // Check rate limits
    if (eventType === 'page_view' && !checkRateLimit('pageView')) {
      return;
    }
    if (eventType === 'click' && !checkClickRateLimit()) {
      return;
    }
    if (eventType === 'share' && !checkRateLimit('share')) {
      return;
    }
    
    const data = {
      tracking_key: CONFIG.trackingKey,
      event_type: eventType,
      device: detectDevice(),
      user_agent: navigator.userAgent,
      url: window.location.href,
      referrer: document.referrer || null,
      session_id: getSessionId(),
      page_title: document.title
    };
    
    // Merge additional data
    for (const key in additionalData) {
      if (additionalData.hasOwnProperty(key)) {
        data[key] = additionalData[key];
      }
    }
    
    const payload = JSON.stringify(data);
    
    // Use sendBeacon if available (more reliable for page unload)
    if (navigator.sendBeacon) {
      const blob = new Blob([payload], { type: 'application/json' });
      navigator.sendBeacon(CONFIG.apiUrl + '/analytics/track', blob);
    } else {
      fetch(CONFIG.apiUrl + '/analytics/track', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: payload,
        keepalive: true
      }).catch(function(error) {
        console.warn('HotelLink Analytics: Failed to track event', error);
      });
    }
  }
  
  // ========== CLICK TRACKING ==========
  function handleClick(event) {
    let target = event.target;
    
    // Find closest button, link, or trackable element
    while (target && target !== document) {
      if (target.tagName === 'BUTTON' || target.tagName === 'A' || target.hasAttribute('data-track')) {
        break;
      }
      target = target.parentElement;
    }
    
    if (!target || target === document) return;
    
    const featureId = target.getAttribute('data-feature-id');
    const categoryId = target.getAttribute('data-category-id');
    
    const clickData = {
      element: target.tagName.toLowerCase(),
      text: (target.textContent || '').trim().substring(0, 100),
      href: target.href || '',
      className: target.className || '',
      id: target.id || '',
      feature_id: featureId ? parseInt(featureId, 10) : null,
      category_id: categoryId ? parseInt(categoryId, 10) : null
    };
    
    trackEvent('click', clickData);
  }
  
  // ========== INITIALIZATION ==========
  // Track initial page view
  trackEvent('page_view');
  
  // Setup click tracking
  document.addEventListener('click', handleClick, true);
  
  // Expose global tracking function
  window.hotelLinkTrack = trackEvent;
  
  console.log('HotelLink Analytics v2.0 initialized with tracking key:', CONFIG.trackingKey);
  
})();
</script>
